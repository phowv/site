server {
	listen 80;
	server_name phowv.com;
	return 301 https://$host$request_uri;
}

server {
	listen 80;
	server_name www.phowv.com;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	server_name phowv.com;
  ssl_certificate     /etc/letsencrypt/live/phowv.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/phowv.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  root /usr/share/nginx/phowv;
	index index.html;

  location / {
		try_files $uri $uri/ /index.html;
	}
}